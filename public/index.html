<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inkorgsrapport — MLC</title>
<link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
<style>
  :root {
    --bg: #f5eaef;
    --card: #ffffff;
    --card-hover: #fcf4f7;
    --border: #e6ced8;
    --text: #40262d;
    --text-secondary: #80606b;
    --accent: #c46a8a;
    --accent-hover: #b35a7a;
    --red: #d45050;
    --orange: #e8a840;
    --green: #5cb87a;
    --purple: #c46a8a;
    --section-bg: #f3e4ec;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: linear-gradient(180deg, #f0d4e0 0%, #f5dfe8 30%, #f5eaef 60%, #faf0f5 100%);
    min-height: 100vh;
    color: var(--text);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 20px 80px;
  }

  header {
    text-align: left;
    margin-bottom: 40px;
  }

  header h1 {
    font-size: 32px;
    font-weight: 700;
    letter-spacing: -0.5px;
    margin-bottom: 8px;
  }

  header p {
    color: var(--text-secondary);
    font-size: 15px;
  }

  .header-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
    margin-bottom: 8px;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .refresh-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 14px;
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    cursor: pointer;
    transition: all 0.15s;
  }

  .refresh-btn:hover {
    background: var(--card-hover);
    border-color: var(--accent);
  }

  .refresh-btn.loading {
    opacity: 0.6;
    pointer-events: none;
  }

  .refresh-btn .spin {
    display: inline-block;
    transition: transform 0.3s;
  }

  .refresh-btn.loading .spin {
    animation: spin 1s linear infinite;
  }

  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  .last-updated {
    font-size: 12px;
    color: var(--text-secondary);
    margin-top: 6px;
  }

  .stats-bar {
    display: flex;
    gap: 1px;
    background: var(--border);
    border-radius: 14px;
    overflow: hidden;
    margin-bottom: 36px;
  }

  .stat {
    flex: 1;
    background: var(--card);
    padding: 18px 16px;
    text-align: center;
  }

  .stat:first-child { border-radius: 14px 0 0 14px; }
  .stat:last-child { border-radius: 0 14px 14px 0; }

  .stat {
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    user-select: none;
  }

  .stat:hover {
    background: var(--card-hover);
  }

  .stat.active {
    background: var(--card-hover);
    box-shadow: inset 0 -3px 0 var(--accent), 0 2px 8px rgba(196,106,138,0.15);
  }

  .stat-value {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -1px;
  }

  .stat-label {
    font-size: 12px;
    color: var(--text-secondary);
    margin-top: 4px;
    font-weight: 500;
  }

  .section {
    margin-bottom: 32px;
  }

  .section.hidden {
    display: none;
  }

  .section-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
    padding: 0 6px;
  }

  .section-icon {
    width: 30px;
    height: 30px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
  }

  .section-title {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }

  .section-count {
    font-size: 12px;
    color: var(--text-secondary);
    margin-left: auto;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    margin-bottom: 8px;
    transition: all 0.15s ease;
    position: relative;
  }

  .card:hover {
    background: var(--card-hover);
    border-color: var(--accent);
    transform: translateY(-1px);
    box-shadow: 0 2px 8px rgba(196,106,138,0.1);
  }

  .card.checked {
    opacity: 0.5;
    background: var(--section-bg);
  }

  .card.checked .card-subject {
    text-decoration: line-through;
  }

  .card-top {
    display: flex;
    gap: 14px;
    align-items: flex-start;
  }

  .checkbox {
    width: 22px;
    height: 22px;
    border-radius: 6px;
    border: 2px solid var(--border);
    flex-shrink: 0;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    margin-top: 2px;
  }

  .checkbox:hover {
    border-color: var(--accent);
    background: rgba(196,106,138,0.1);
  }

  .checkbox.checked {
    background: var(--accent);
    border-color: var(--accent);
  }

  .checkbox.checked::after {
    content: '✓';
    color: white;
    font-size: 14px;
    font-weight: 700;
  }

  .card-content {
    flex: 1;
    min-width: 0;
  }

  .card-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 4px;
    flex-wrap: wrap;
  }

  .priority-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .priority-high { background: var(--red); }
  .priority-medium { background: var(--orange); }
  .priority-low { background: var(--green); }

  .card-date {
    font-size: 12px;
    color: var(--text-secondary);
    font-weight: 500;
  }

  .card-from {
    font-size: 12px;
    color: var(--text-secondary);
  }

  .card-subject {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .card-preview {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-folder {
    font-size: 11px;
    color: var(--text-secondary);
    margin-top: 4px;
    opacity: 0.7;
  }

  .sync-indicator {
    font-size: 11px;
    margin-left: 8px;
    transition: opacity 0.3s;
  }

  .sync-indicator.syncing { color: var(--orange); }
  .sync-indicator.synced { color: var(--green); }
  .sync-indicator.error { color: var(--red); }

  /* Calendar styles */
  .calendar-section {
    margin-bottom: 32px;
  }

  .calendar-details {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
  }

  .calendar-details[open] {
    box-shadow: 0 2px 12px rgba(64,38,45,0.06);
  }

  .calendar-summary {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    cursor: pointer;
    user-select: none;
    list-style: none;
  }

  .calendar-summary::-webkit-details-marker { display: none; }

  .calendar-summary-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .cal-title {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }

  .cal-today-preview {
    font-size: 13px;
    color: var(--text-secondary);
  }

  .cal-toggle {
    font-size: 12px;
    color: var(--accent);
    font-weight: 600;
    transition: transform 0.2s;
  }

  .calendar-details[open] .cal-toggle {
    transform: rotate(180deg);
  }

  .calendar-inner {
    padding: 0 18px 18px;
  }

  .calendar-legend {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 12px;
  }

  .calendar-legend-item {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    color: var(--text-secondary);
  }

  .calendar-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }

  .dot-arbete { background: #8ed4a6; }
  .dot-privat { background: #89b4e8; }
  .dot-familj { background: #c9a0c9; }
  .dot-evolan { background: #f0a868; }
  .dot-yobedoo { background: #5ec6c6; }
  .dot-exchange { background: #c4a882; }

  .calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 8px;
  }

  .calendar-day-box {
    background: var(--section-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 8px 8px;
    min-height: 90px;
  }

  .calendar-day-box.is-today {
    background: #fff;
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(196,106,138,0.18);
  }

  .calendar-day-box.is-empty {
    opacity: 0.6;
  }

  .calendar-day-name {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    color: var(--text-secondary);
    margin-bottom: 2px;
  }

  .calendar-day-num {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 6px;
  }

  .cal-ev {
    display: flex;
    align-items: center;
    gap: 0;
    padding: 0;
    margin-bottom: 4px;
    font-size: 11px;
    line-height: 1.3;
    color: var(--text);
    border-radius: 6px;
    overflow: hidden;
  }

  .cal-ev-bar {
    width: 4px;
    align-self: stretch;
    min-height: 22px;
    flex-shrink: 0;
    border-radius: 6px 0 0 6px;
  }

  .cal-ev-bar.dot-arbete { background: #8ed4a6; }
  .cal-ev-bar.dot-privat { background: #89b4e8; }
  .cal-ev-bar.dot-familj { background: #c9a0c9; }
  .cal-ev-bar.dot-evolan { background: #f0a868; }
  .cal-ev-bar.dot-yobedoo { background: #5ec6c6; }
  .cal-ev-bar.dot-exchange { background: #c4a882; }

  .cal-ev-body {
    flex: 1;
    min-width: 0;
    padding: 4px 6px;
    border-radius: 0 6px 6px 0;
  }

  .cal-ev-body.bg-arbete { background: rgba(142,212,166,0.15); }
  .cal-ev-body.bg-privat { background: rgba(137,180,232,0.15); }
  .cal-ev-body.bg-familj { background: rgba(201,160,201,0.15); }
  .cal-ev-body.bg-evolan { background: rgba(240,168,104,0.15); }
  .cal-ev-body.bg-yobedoo { background: rgba(94,198,198,0.15); }
  .cal-ev-body.bg-exchange { background: rgba(196,168,130,0.15); }

  .cal-ev-text {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-weight: 500;
  }

  .cal-ev-time {
    color: var(--text-secondary);
    font-size: 10px;
    font-weight: 600;
  }

  .calendar-loading, .calendar-error {
    text-align: center;
    padding: 20px;
    color: var(--text-secondary);
    font-size: 13px;
    grid-column: 1 / -1;
    background: var(--card);
    border-radius: 10px;
    border: 1px solid var(--border);
  }

  .loading-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-secondary);
    font-size: 15px;
  }

  .loading-state .spinner {
    display: inline-block;
    width: 32px;
    height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 16px;
  }

  .error-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--red);
    font-size: 14px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--green);
    font-size: 18px;
    font-weight: 600;
  }

  footer {
    text-align: center;
    padding: 30px 20px;
    color: var(--text-secondary);
    font-size: 13px;
  }

  @media (max-width: 600px) {
    .container { padding: 20px 12px 60px; }
    header h1 { font-size: 24px; }
    .header-row { flex-wrap: wrap; }
    .stats-bar { flex-direction: column; border-radius: 12px; }
    .stat:first-child { border-radius: 12px 12px 0 0; }
    .stat:last-child { border-radius: 0 0 12px 12px; }
    .stat { padding: 12px; }
    .stat-value { font-size: 22px; }
    .card { padding: 14px 16px; }
    .card-subject { white-space: normal; }
    .section-header { padding: 0 4px; }
    .calendar-grid { grid-template-columns: repeat(2, 1fr); }
    .calendar-day-box { min-height: 60px; padding: 8px 8px 6px; }
    .calendar-summary { flex-wrap: wrap; gap: 6px; padding: 12px 14px; }
    .calendar-legend { flex-wrap: wrap; }
    .calendar-inner { padding: 0 14px 14px; }
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="header-row">
      <div class="header-left">
        <img src="/mlc-logo.png" alt="MLC" style="width:48px; height:48px; aspect-ratio:1/1; object-fit:contain;">
        <h1>Inkorgsrapport</h1>
      </div>
      <button class="refresh-btn" id="refresh-btn" onclick="refreshEmails()">
        <span class="spin">&#8635;</span> Uppdatera
      </button>
    </div>
    <p>Olästa mejl som kräver din uppmärksamhet</p>
    <div class="last-updated" id="last-updated"></div>
  </header>

  <div class="stats-bar">
    <div class="stat active" data-filter="alla" onclick="filterSections(this, 'alla')">
      <div class="stat-value" style="color: var(--accent)" id="stat-alla">—</div>
      <div class="stat-label">Viktiga</div>
    </div>
    <div class="stat" data-filter="affar" onclick="filterSections(this, 'affar')">
      <div class="stat-value" id="stat-affar">—</div>
      <div class="stat-label">Affär / Kund</div>
    </div>
    <div class="stat" data-filter="hog" onclick="filterSections(this, 'hog')">
      <div class="stat-value" id="stat-hog">—</div>
      <div class="stat-label">Hög prioritet</div>
    </div>
    <div class="stat" data-filter="kvar" onclick="filterSections(this, 'kvar')">
      <div class="stat-value" id="stat-kvar" style="color: var(--red)">—</div>
      <div class="stat-label">Kvar att hantera</div>
    </div>
  </div>

  <!-- KALENDER -->
  <div class="calendar-section" id="calendar-section">
    <details class="calendar-details" open>
      <summary class="calendar-summary">
        <div class="calendar-summary-left">
          <div class="cal-title">Denna vecka</div>
          <div class="cal-today-preview" id="cal-today-preview"></div>
        </div>
        <div class="cal-toggle">&#9660;</div>
      </summary>
      <div class="calendar-inner">
        <div class="calendar-legend">
          <div class="calendar-legend-item"><div class="calendar-dot dot-arbete"></div>Arbete</div>
          <div class="calendar-legend-item"><div class="calendar-dot dot-privat"></div>Privat</div>
          <div class="calendar-legend-item"><div class="calendar-dot dot-familj"></div>Familj</div>
          <div class="calendar-legend-item"><div class="calendar-dot dot-evolan"></div>Evolan</div>
          <div class="calendar-legend-item"><div class="calendar-dot dot-yobedoo"></div>Yobedoo</div>
          <div class="calendar-legend-item"><div class="calendar-dot dot-exchange"></div>Teams</div>
        </div>
        <div class="calendar-grid" id="calendar-events">
          <div class="calendar-loading">Laddar kalender...</div>
        </div>
      </div>
    </details>
  </div>

  <!-- MEJLKORT — byggs dynamiskt -->
  <div id="email-sections">
    <div class="loading-state">
      <div class="spinner"></div>
      <div>Hämtar mejl från Exchange...</div>
    </div>
  </div>
</div>

<footer>
  <p>Genererad av <strong>Projektledaren</strong> &mdash; MLC AI Team</p>
  <p style="margin-top: 6px; font-size: 11px;" id="footer-stats"></p>
</footer>

<script>
(function() {
  const STORAGE_KEY = 'inbox-report-checked';
  let currentEmails = [];
  let currentFilter = 'alla';

  // --- localStorage state ---
  function getChecked() {
    try {
      return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    } catch(e) {
      return {};
    }
  }

  function saveChecked(data) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  }

  function isExpired(val) {
    if (typeof val === 'number') {
      return (Date.now() - val) > 7 * 24 * 60 * 60 * 1000;
    }
    return false;
  }

  // --- Sync indicator ---
  function showSync(card, status) {
    let indicator = card.querySelector('.sync-indicator');
    if (!indicator) {
      indicator = document.createElement('span');
      indicator.className = 'sync-indicator';
      const meta = card.querySelector('.card-meta');
      if (meta) meta.appendChild(indicator);
    }
    indicator.className = 'sync-indicator ' + status;
    indicator.style.opacity = '1';
    if (status === 'syncing') indicator.textContent = 'Synkar...';
    else if (status === 'synced') indicator.textContent = 'Markerad som läst';
    else if (status === 'error') indicator.textContent = 'Kunde inte synka';
  }

  // --- Mark as read in Exchange ---
  async function markAsReadInExchange(messageId, card) {
    if (!messageId) return;
    showSync(card, 'syncing');
    try {
      const resp = await fetch('/api/mark-read', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messageId })
      });
      if (resp.ok) {
        showSync(card, 'synced');
        setTimeout(() => {
          const ind = card.querySelector('.sync-indicator');
          if (ind) ind.style.opacity = '0';
        }, 3000);
      } else {
        showSync(card, 'error');
      }
    } catch (err) {
      showSync(card, 'error');
    }
  }

  // --- Toggle check ---
  window.toggleCheck = function(el) {
    const card = el.closest('.card');
    const id = card.dataset.id;
    const checked = getChecked();

    if (el.classList.contains('checked')) {
      el.classList.remove('checked');
      card.classList.remove('checked');
      delete checked[id];
    } else {
      el.classList.add('checked');
      card.classList.add('checked');
      checked[id] = Date.now();
      markAsReadInExchange(id, card);
    }

    saveChecked(checked);
    updateStats();
  };

  // --- Build cards from API data ---
  function renderEmails(emails) {
    currentEmails = emails;
    const container = document.getElementById('email-sections');
    const checked = getChecked();

    if (!emails || emails.length === 0) {
      container.innerHTML = '<div class="empty-state">Inga olästa viktiga mejl just nu!</div>';
      updateStats();
      return;
    }

    // Gruppera per kategori
    const categoryOrder = ['affar', 'yobedoo', 'scalex', 'ekonomi', 'bolag', 'ovrigt'];
    const categoryStyles = {
      affar: { bg: 'rgba(10,132,255,0.15)', color: 'var(--accent)', icon: '★' },
      yobedoo: { bg: 'rgba(191,90,242,0.15)', color: 'var(--purple)', icon: '◆' },
      scalex: { bg: 'rgba(48,209,88,0.15)', color: 'var(--green)', icon: '▲' },
      ekonomi: { bg: 'rgba(255,69,58,0.15)', color: 'var(--red)', icon: '●' },
      bolag: { bg: 'rgba(255,159,10,0.15)', color: 'var(--orange)', icon: '■' },
      ovrigt: { bg: 'rgba(139,106,175,0.12)', color: '#8b6aaf', icon: '◉' },
    };

    const groups = {};
    for (const email of emails) {
      const cat = email.category || 'ovrigt';
      if (!groups[cat]) groups[cat] = { label: email.categoryLabel, emails: [] };
      groups[cat].emails.push(email);
    }

    let html = '';

    for (const cat of categoryOrder) {
      if (!groups[cat]) continue;
      const group = groups[cat];
      const style = categoryStyles[cat] || categoryStyles.ovrigt;
      html += `<div class="section" data-category="${cat}">`;
      html += `<div class="section-header">`;
      html += `<div class="section-icon" style="background: ${style.bg}; color: ${style.color};">${style.icon}</div>`;
      html += `<div class="section-title">${group.label}</div>`;
      html += `<div class="section-count">${group.emails.length} mejl</div>`;
      html += `</div>`;

      for (const email of group.emails) {
        const isChecked = checked[email.id];
        const expired = isChecked && isExpired(isChecked);
        const cardClass = expired ? 'display:none' : (isChecked ? '' : '');
        const checkedClass = isChecked && !expired ? ' checked' : '';
        const cbChecked = isChecked && !expired ? ' checked' : '';

        html += `<div class="card${checkedClass}" data-id="${email.id}" data-priority="${email.priority}"${expired ? ' data-expired="true" style="display:none"' : ''}>`;
        html += `<div class="card-top">`;
        html += `<div class="checkbox${cbChecked}" onclick="toggleCheck(this)"></div>`;
        html += `<div class="card-content">`;
        html += `<div class="card-meta">`;
        html += `<div class="priority-dot priority-${email.priority}"></div>`;
        html += `<span class="card-date">${email.date}</span>`;
        html += `<span class="card-from">${escapeHtml(email.from)}</span>`;
        html += `</div>`;
        html += `<div class="card-subject">${escapeHtml(email.subject)}</div>`;
        if (email.preview) {
          html += `<div class="card-preview">${escapeHtml(email.preview)}</div>`;
        }
        if (email.folder && email.folder !== 'Inkorg') {
          html += `<div class="card-folder">${escapeHtml(email.folder)}</div>`;
        }
        html += `</div></div></div>`;
      }

      html += `</div>`;
    }

    container.innerHTML = html;
    updateStats();

    // Återställ filter om det var aktivt
    if (currentFilter !== 'alla') {
      const activeBtn = document.querySelector(`[data-filter="${currentFilter}"]`);
      if (activeBtn) filterSections(activeBtn, currentFilter);
    }
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  // --- Update stats ---
  function updateStats() {
    const allCards = document.querySelectorAll('.card:not([data-expired="true"])');
    const activeCards = [...allCards].filter(c => !c.classList.contains('checked'));
    const remaining = activeCards.length;

    document.getElementById('stat-alla').textContent = remaining;

    const affarCards = [...document.querySelectorAll('[data-category="affar"] .card:not([data-expired="true"])')].filter(c => !c.classList.contains('checked'));
    document.getElementById('stat-affar').textContent = affarCards.length;

    const hogCards = activeCards.filter(c => c.dataset.priority === 'high' || c.querySelector('.priority-high'));
    document.getElementById('stat-hog').textContent = hogCards.length;

    document.getElementById('stat-kvar').textContent = remaining;
  }

  // --- Filter sections ---
  // OBS: Sektionsrubriker göms ALDRIG — bara korten filtreras
  window.filterSections = function(el, filter) {
    currentFilter = filter;
    document.querySelectorAll('.stat').forEach(s => s.classList.remove('active'));
    el.classList.add('active');

    const sections = document.querySelectorAll('.section');

    sections.forEach(s => {
      // Rubrik alltid synlig
      s.classList.remove('hidden');

      s.querySelectorAll('.card').forEach(c => {
        if (c.dataset.expired === 'true') {
          c.style.display = 'none';
          return;
        }

        if (filter === 'alla') {
          c.style.display = '';
        } else if (filter === 'affar') {
          c.style.display = s.dataset.category === 'affar' ? '' : 'none';
        } else if (filter === 'hog') {
          c.style.display = (c.dataset.priority === 'high') ? '' : 'none';
        } else if (filter === 'kvar') {
          c.style.display = c.classList.contains('checked') ? 'none' : '';
        }
      });
    });
  };

  // --- Fetch emails from API ---
  async function fetchEmails() {
    const btn = document.getElementById('refresh-btn');
    btn.classList.add('loading');

    try {
      const resp = await fetch('/api/important-emails');
      if (!resp.ok) throw new Error('API error ' + resp.status);
      const data = await resp.json();

      renderEmails(data.emails || []);

      // Uppdatera "senast uppdaterad"
      const now = new Date();
      const timeStr = now.toLocaleTimeString('sv-SE', { hour: '2-digit', minute: '2-digit' });
      const dateStr = now.toLocaleDateString('sv-SE', { day: 'numeric', month: 'short' });
      document.getElementById('last-updated').textContent =
        `Senast uppdaterad: ${dateStr} kl ${timeStr}`;

      // Footer stats
      document.getElementById('footer-stats').textContent =
        `${data.important} av ${data.total} olästa mejl klassades som viktiga. ${data.filtered} filtrerades bort (nyhetsbrev, notiser, skräp).`;

      // Spara senaste hämtning
      localStorage.setItem('inbox-last-fetch', JSON.stringify({
        time: now.toISOString(),
        emails: data.emails,
        total: data.total,
        filtered: data.filtered,
        important: data.important,
      }));

    } catch (err) {
      // Försök visa cachad data
      const cached = getCachedEmails();
      if (cached) {
        renderEmails(cached.emails);
        const cacheTime = new Date(cached.time);
        document.getElementById('last-updated').textContent =
          `Visar cachad data från ${cacheTime.toLocaleDateString('sv-SE', { day: 'numeric', month: 'short' })} kl ${cacheTime.toLocaleTimeString('sv-SE', { hour: '2-digit', minute: '2-digit' })} (kunde inte hämta ny data)`;
        document.getElementById('footer-stats').textContent =
          `${cached.important} av ${cached.total} olästa mejl klassades som viktiga.`;
      } else {
        document.getElementById('email-sections').innerHTML =
          `<div class="error-state">Kunde inte hämta mejl. Försök igen.<br><small>${err.message}</small></div>`;
      }
    }

    btn.classList.remove('loading');
  }

  function getCachedEmails() {
    try {
      return JSON.parse(localStorage.getItem('inbox-last-fetch'));
    } catch(e) {
      return null;
    }
  }

  window.refreshEmails = function() {
    fetchEmails();
  };

  // --- Ladda mejl vid sidladdning ---
  // Visa cachad data direkt, sedan hämta färsk data
  const cached = getCachedEmails();
  if (cached && cached.emails) {
    renderEmails(cached.emails);
    const cacheTime = new Date(cached.time);
    document.getElementById('last-updated').textContent =
      `Från ${cacheTime.toLocaleDateString('sv-SE', { day: 'numeric', month: 'short' })} kl ${cacheTime.toLocaleTimeString('sv-SE', { hour: '2-digit', minute: '2-digit' })} — uppdaterar...`;
    document.getElementById('footer-stats').textContent =
      `${cached.important} av ${cached.total} olästa mejl klassades som viktiga.`;
  }

  // Hämta färsk data
  fetchEmails();

  // --- KALENDER — 7 dagboxar ---
  (async function loadCalendar() {
    const container = document.getElementById('calendar-events');

    function localKey(d) {
      return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    }

    try {
      const resp = await fetch('/api/calendar');
      if (!resp.ok) throw new Error('API error ' + resp.status);
      const { events } = await resp.json();

      const dayNamesShort = ['sön','mån','tis','ons','tor','fre','lör'];

      const today = new Date();
      today.setHours(0,0,0,0);
      const todayKey = localKey(today);

      const eventsByDay = {};
      if (events) {
        for (const ev of events) {
          const d = new Date(ev.start);
          const key = localKey(d);
          if (!eventsByDay[key]) eventsByDay[key] = [];
          eventsByDay[key].push(ev);
        }
      }

      let html = '';
      for (let i = 0; i < 7; i++) {
        const d = new Date(today.getTime() + i * 86400000);
        const key = localKey(d);
        const dayEvents = eventsByDay[key] || [];
        const isToday = key === todayKey;
        const isEmpty = dayEvents.length === 0;

        html += '<div class="calendar-day-box' + (isToday ? ' is-today' : '') + (isEmpty ? ' is-empty' : '') + '">';
        html += '<div class="calendar-day-name">' + dayNamesShort[d.getDay()] + '</div>';
        html += '<div class="calendar-day-num">' + d.getDate() + '</div>';

        for (const ev of dayEvents) {
          const time = ev.allDay
            ? ''
            : new Date(ev.start).toLocaleTimeString('sv-SE', { hour: '2-digit', minute: '2-digit' });
          const cal = ev.calendar;

          html += '<div class="cal-ev">';
          html += '<div class="cal-ev-bar dot-' + cal + '"></div>';
          html += '<div class="cal-ev-body bg-' + cal + '">';
          html += '<div class="cal-ev-text">' + ev.title + '</div>';
          if (time) html += '<div class="cal-ev-time">' + time + '</div>';
          html += '</div>';
          html += '</div>';
        }

        html += '</div>';
      }

      container.innerHTML = html;
    } catch (err) {
      container.innerHTML = '<div class="calendar-error">Kunde inte ladda kalendern</div>';
    }
  })();
})();
</script>
</body>
</html>
